# TODOアプリ開発環境
# 起動: docker compose up -d / 停止: docker compose down
services:
  # Laravel アプリケーション(PHP + Composer 入りの bitnami イメージ)
  app:
    # 2025年8月の Bitnami 配布方針変更で bitnami/laravel:latest は動作しなくなったため、
    # 公式が案内する保管リポジトリ bitnamilegacy を使用(docs/01_sprint1 参照)
    image: bitnamilegacy/laravel:latest
    ports:
      - "8080:8000" # PC側:コンテナ側(8000はPC上の別プロジェクトが使用中のため8080に)
    environment:
      - APP_TIMEZONE=Asia/Tokyo # 日時の表示・保存を日本時間にする(デフォルトはUTC)
      # Laravel が読む DB 接続設定(接続先はサービス名 "mysql")
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=todo_app
      - DB_USERNAME=todo_user
      - DB_PASSWORD=todo_pass # ローカル開発専用のダミー値。本番の秘密情報はコミットしない
    volumes:
      - ./src:/app # Laravel のコードは PC 側 (./src) に保存する
    depends_on:
      mysql:
        condition: service_healthy # MySQL が応答可能になってから起動する

  # MySQL データベース
  mysql:
    image: mysql:8.4
    environment:
      - MYSQL_DATABASE=todo_app
      - MYSQL_USER=todo_user
      - MYSQL_PASSWORD=todo_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    volumes:
      - mysql_data:/var/lib/mysql # DB のデータはコンテナを消しても残す
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data: # MySQL データ永続化用の名前付きボリューム
